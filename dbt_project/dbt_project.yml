name: datahub_cdm
version: '1.0.0'
config-version: 2
profile: datahub_trino

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  datahub_cdm:
    staging:
      +materialized: table
      +schema: staging
    cdm:
      +materialized: incremental
      +schema: cdm
      +on_schema_change: append_new_columns
    marts:
      +materialized: table
      +schema: marts
