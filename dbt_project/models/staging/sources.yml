version: 2

sources:
  - name: retail
    database: postgres
    schema: public
    description: "Raw retail data sourced from PostgreSQL operational database"
    tables:
      - name: customers
        description: "Raw customer records from source PostgreSQL"
        columns:
          - name: customer_id
            description: "Primary key for customers"
            tests:
              - not_null
          - name: email
            description: "Nullable — some customers have no email (DQ issue)"
          - name: first_name
            description: "Customer first name"
          - name: last_name
            description: "Customer last name"
          - name: phone
            description: "Customer phone number"
          - name: date_of_birth
            description: "Customer date of birth"
          - name: gender
            description: "Customer gender"
          - name: city
            description: "Customer city"
          - name: state_province
            description: "Customer state or province"
          - name: country_id
            description: "Foreign key to countries table"
          - name: zip_code
            description: "Customer postal code"
          - name: loyalty_tier
            description: "Customer loyalty tier (Bronze, Silver, Gold, Platinum)"
          - name: loyalty_points
            description: "Accumulated loyalty points"
          - name: acquired_channel
            description: "Channel through which customer was acquired"
          - name: is_active
            description: "Whether the customer account is active"
          - name: created_at
            description: "Timestamp of customer record creation"

      - name: orders
        description: "Raw orders from source PostgreSQL"
        columns:
          - name: order_id
            description: "Primary key for orders"
            tests:
              - not_null
          - name: order_code
            description: "Business-facing order code — has intentional duplicates for DQ testing"
          - name: customer_id
            description: "Foreign key to customers"
          - name: store_id
            description: "Foreign key to stores — NULL for online orders"
          - name: order_date
            description: "Date the order was placed"
          - name: status
            description: "Order status"
          - name: subtotal
            description: "Order subtotal before discounts"
          - name: discount_amount
            description: "Total discount applied"
          - name: shipping_cost
            description: "Shipping cost for the order"
          - name: tax_amount
            description: "Tax amount"
          - name: total_amount
            description: "Final total including all fees"
          - name: currency_code
            description: "Currency of the transaction"
          - name: payment_method
            description: "Payment method used"
          - name: promo_code
            description: "Promotional code applied"
          - name: created_at
            description: "Timestamp of record creation"

      - name: order_items
        description: "Line items for each order"
        columns:
          - name: order_item_id
            description: "Primary key for order items"
          - name: order_id
            description: "Foreign key to orders"
          - name: product_id
            description: "Foreign key to products"
          - name: quantity
            description: "Quantity ordered"
          - name: unit_price
            description: "Unit price at time of order"
          - name: discount_pct
            description: "Discount percentage applied to this line item"
          - name: line_total
            description: "Total for this line item — some values are 0 (DQ issue)"

      - name: products
        description: "Product catalog"
        columns:
          - name: product_id
            description: "Primary key for products"
          - name: sku
            description: "Stock-keeping unit identifier"
          - name: product_name
            description: "Product name"
          - name: category_id
            description: "Foreign key to product_categories"
          - name: brand
            description: "Product brand"
          - name: unit_price
            description: "Current selling price"
          - name: cost_price
            description: "Cost of goods"
          - name: weight_kg
            description: "Product weight in kilograms"
          - name: stock_quantity
            description: "Current stock level"
          - name: reorder_level
            description: "Minimum stock before reorder is triggered"
          - name: is_active
            description: "Whether the product is active in the catalog"
          - name: created_at
            description: "Timestamp of product record creation"

      - name: product_categories
        description: "Hierarchical product categories"
        columns:
          - name: category_id
            description: "Primary key for product categories"
          - name: category_name
            description: "Name of the category"
          - name: parent_category_id
            description: "Self-referencing foreign key for hierarchy"

      - name: stores
        description: "Physical and virtual store locations"
        columns:
          - name: store_id
            description: "Primary key for stores"
          - name: store_code
            description: "Business-facing store code"
          - name: store_name
            description: "Store name"
          - name: store_type
            description: "Type of store (e.g. flagship, outlet, online)"
          - name: city
            description: "City where store is located"
          - name: state_province
            description: "State or province"
          - name: country_id
            description: "Foreign key to countries"
          - name: zip_code
            description: "Postal code"
          - name: opened_date
            description: "Date the store was opened"
          - name: square_footage
            description: "Store floor area in square feet"
          - name: is_active
            description: "Whether the store is currently active"
          - name: manager_name
            description: "Name of the store manager"

      - name: countries
        description: "Country reference data"
        columns:
          - name: country_id
            description: "Primary key for countries"
          - name: country_name
            description: "Full country name"
          - name: country_code
            description: "ISO two-letter country code"
          - name: region
            description: "Geographic region"

      - name: suppliers
        description: "Product supplier records"
        columns:
          - name: supplier_id
            description: "Primary key for suppliers"
          - name: supplier_name
            description: "Supplier company name"
          - name: contact_name
            description: "Primary contact person"
          - name: email
            description: "Supplier email address"
          - name: phone
            description: "Supplier phone number"
          - name: country_id
            description: "Foreign key to countries"

      - name: returns
        description: "Order return records"
        columns:
          - name: return_id
            description: "Primary key for returns"
          - name: order_id
            description: "Foreign key to orders"
          - name: order_item_id
            description: "Foreign key to order_items"
          - name: return_date
            description: "Date the return was initiated"
          - name: reason
            description: "Reason for return"
          - name: status
            description: "Return processing status"
          - name: refund_amount
            description: "Refund amount issued"

      - name: employees
        description: "Store and corporate employee records"
        columns:
          - name: employee_id
            description: "Primary key for employees"
          - name: first_name
            description: "Employee first name"
          - name: last_name
            description: "Employee last name"
          - name: email
            description: "Employee email"
          - name: store_id
            description: "Foreign key to stores — NULL for corporate employees"
          - name: job_title
            description: "Employee job title"
          - name: hire_date
            description: "Date of hire"
          - name: is_active
            description: "Whether the employee is currently active"

      - name: promotions
        description: "Marketing promotion campaigns"
        columns:
          - name: promo_id
            description: "Primary key for promotions"
          - name: promo_code
            description: "Promotion code used at checkout"
          - name: promo_name
            description: "Display name for the promotion"
          - name: discount_type
            description: "Type of discount (percentage, fixed)"
          - name: discount_value
            description: "Value of the discount"
          - name: start_date
            description: "Promotion start date"
          - name: end_date
            description: "Promotion end date"
          - name: is_active
            description: "Whether the promotion is currently active"

      - name: inventory_snapshots
        description: "Point-in-time inventory levels by product and store"
        columns:
          - name: snapshot_id
            description: "Primary key for inventory snapshots"
          - name: product_id
            description: "Foreign key to products"
          - name: store_id
            description: "Foreign key to stores"
          - name: snapshot_date
            description: "Date of the inventory snapshot"
          - name: quantity_on_hand
            description: "Total quantity on hand"
          - name: quantity_reserved
            description: "Quantity reserved for pending orders"
          - name: reorder_triggered
            description: "Whether a reorder was triggered at this snapshot"
