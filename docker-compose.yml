# =============================================================================
# DataLens — Minimal Dev Docker Compose Stack
# 9 services, ~5.8GB total memory, no OpenMetadata/OpenSearch/Hive metastore
# Iceberg catalog backed by Project Nessie (REST catalog)
# =============================================================================

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
    pull: true
  image: datalens-airflow:local
  pull_policy: build
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__PARALLELISM: "8"
    AIRFLOW__CORE__DAG_CONCURRENCY: "4"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "4"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__API__SECRET_KEY: ${SECRET_KEY}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${AIRFLOW_DB:-airflow}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    TRINO_HOST: trino
    TRINO_PORT: "8080"
    AIRFLOW_HOST: airflow-apiserver
    AIRFLOW_PORT: "8080"
    PYTHONDONTWRITEBYTECODE: "1"
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./dbt_project:/opt/airflow/dbt_project
    - ./ingestion:/opt/airflow/ingestion:ro
    - airflow_logs:/opt/airflow/logs
  networks:
    - datalens-net

networks:
  datalens-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  airflow_logs:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL: metadata store for Airflow, Nessie, and retail DB
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: datalens-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datalens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datalens123}
      POSTGRES_INITDB_ARGS: >-
        --encoding=UTF8
        --auth-local=scram-sha-256
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datalens}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"
    networks:
      - datalens-net

  # ---------------------------------------------------------------------------
  # MinIO: S3-compatible object storage for Iceberg
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: datalens-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    networks:
      - datalens-net

  # ---------------------------------------------------------------------------
  # MinIO init: create S3 buckets
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: datalens-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: sh
    command: |
      -c "
      /usr/bin/mc config host add minio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
      /usr/bin/mc mb --ignore-existing minio/${MINIO_BUCKET_WAREHOUSE:-warehouse} &&
      /usr/bin/mc mb --ignore-existing minio/${MINIO_BUCKET_RAW:-raw}
      "
    restart: no
    networks:
      - datalens-net

  # ---------------------------------------------------------------------------
  # Project Nessie: REST catalog for Iceberg
  # ---------------------------------------------------------------------------
  nessie:
    image: projectnessie/nessie:latest
    container_name: datalens-nessie
    restart: unless-stopped
    ports:
      - "19120:19120"
    environment:
      QUARKUS_PROFILE: prod
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-datalens}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-datalens123}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/nessie
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/api/v2/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    networks:
      - datalens-net

  # ---------------------------------------------------------------------------
  # Trino: federated query engine (coordinator + worker)
  # ---------------------------------------------------------------------------
  trino:
    image: trinodb/trino:481
    container_name: datalens-trino
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./infra/trino/etc:/etc/trino:ro
      - ./infra/trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false' && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    networks:
      - datalens-net

  # ---------------------------------------------------------------------------
  # Airflow: workflow orchestration (init one-shot)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: datalens-airflow-init
    command: bash -c "airflow db migrate && airflow users create --username admin --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname admin --lastname user --role Admin --email admin@example.com 2>/dev/null || true"
    restart: no
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Airflow: API server
  # ---------------------------------------------------------------------------
  airflow-apiserver:
    <<: *airflow-common
    container_name: datalens-airflow-apiserver
    command: api-server
    ports:
      - "8082:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Airflow: scheduler
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: datalens-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Airflow: DAG processor (Airflow 3.x requirement)
  # ---------------------------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: datalens-airflow-dag-processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # FastAPI: backend API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: runtime
      pull: true
    image: datalens-api:local
    pull_policy: build
    container_name: datalens-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-datalens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datalens123}
      POSTGRES_DB: ${POSTGRES_DB:-retail}
      TRINO_HOST: ${TRINO_HOST:-trino}
      TRINO_PORT: ${TRINO_PORT:-8080}
      TRINO_USER: ${TRINO_USER:-admin}
      AIRFLOW_HOST: airflow-apiserver
      AIRFLOW_PORT: "8080"
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./api:/app:ro
      - ./ingestion:/app/ingestion:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - datalens-net

  # ---------------------------------------------------------------------------
  # React/Vite: frontend SPA
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      pull: true
    image: datalens-frontend:local
    pull_policy: build
    container_name: datalens-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://api:8000
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "1.0"
    networks:
      - datalens-net
