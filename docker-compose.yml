networks:
  datalens-net:
    driver: bridge
volumes:
  postgres_data: null
  minio_data: null
  elasticsearch_data: null
services:
  postgres:
    image: postgres:17
    container_name: datalens-postgres
    restart: unless-stopped
    ports:
    - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - datalens-net
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: datalens-minio
    restart: unless-stopped
    ports:
    - 9000:9000
    - 9001:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
    - minio_data:/data
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
    - datalens-net
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: datalens-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: "/bin/sh -c \"\n  mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER\
      \ $$MINIO_ROOT_PASSWORD &&\n  mc mb myminio/warehouse --ignore-existing &&\n\
      \  mc mb myminio/raw --ignore-existing &&\n  echo 'MinIO buckets ready.'\n\"\
      \n"
    networks:
    - datalens-net
  hive-metastore:
    image: bitsondatadev/hive-metastore:latest
    container_name: datalens-hive-metastore
    restart: unless-stopped
    ports:
    - 9083:9083
    environment:
      METASTORE_DB_HOSTNAME: postgres
      METASTORE_DB_PORT: 5432
      METASTORE_DB_NAME: ${POSTGRES_DB}
      METASTORE_DB_USER: ${POSTGRES_USER}
      METASTORE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
    - datalens-net
  trino:
    image: trinodb/trino:460
    container_name: datalens-trino
    restart: unless-stopped
    ports:
    - 8080:8080
    volumes:
    - ./infra/trino/catalog:/etc/trino/catalog:ro
    - ./infra/trino/etc:/etc/trino
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/v1/info
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
    - hive-metastore
    networks:
    - datalens-net
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: datalens-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${AIRFLOW_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin123}
      _AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@datalens.local}
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_ROLE: Admin
      TRINO_HOST: trino
      TRINO_PORT: '8080'
      OM_HOST: openmetadata-server
      OM_PORT: '8585'
    entrypoint: "/bin/bash -c \"\n  airflow db migrate &&\n  (airflow users create\
      \ --username $$_AIRFLOW_WWW_USER_USERNAME --password $$_AIRFLOW_WWW_USER_PASSWORD\
      \ --email $$_AIRFLOW_WWW_USER_EMAIL --firstname $$_AIRFLOW_WWW_USER_FIRSTNAME\
      \ --lastname $$_AIRFLOW_WWW_USER_LASTNAME --role $$_AIRFLOW_WWW_USER_ROLE ||\
      \ true) &&\n  echo 'Airflow init complete.'\n\"\n"
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./dbt_project:/opt/airflow/dbt_project
    - ./ingestion:/opt/airflow/ingestion:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - datalens-net
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: datalens-airflow-webserver
    restart: unless-stopped
    ports:
    - 8082:8080
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${AIRFLOW_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      TRINO_HOST: trino
      TRINO_PORT: '8080'
      OM_HOST: openmetadata-server
      OM_PORT: '8585'
    command: webserver
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./dbt_project:/opt/airflow/dbt_project
    - ./ingestion:/opt/airflow/ingestion:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
    - airflow-init
    networks:
    - datalens-net
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: datalens-airflow-scheduler
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${AIRFLOW_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      TRINO_HOST: trino
      TRINO_PORT: '8080'
      OM_HOST: openmetadata-server
      OM_PORT: '8585'
    command: scheduler
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./dbt_project:/opt/airflow/dbt_project
    - ./ingestion:/opt/airflow/ingestion:ro
    healthcheck:
      test:
      - CMD-SHELL
      - airflow jobs check --job-type SchedulerJob --hostname $(hostname)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
    - airflow-init
    networks:
    - datalens-net
  elasticsearch:
    image: elasticsearch:8.18.0
    container_name: datalens-elasticsearch
    restart: unless-stopped
    ports:
    - 9200:9200
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
    - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9200/_cluster/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
    - datalens-net
  openmetadata-server-init:
    image: openmetadata/server:1.6.1
    container_name: datalens-openmetadata-server-init
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_USER_PASSWORD: ${POSTGRES_PASSWORD}
      OM_DATABASE: openmetadata
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: 'false'
      DB_AUTHENTICATION_TYPE: basic
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
    entrypoint: "/bin/bash -c \"\n  ./bootstrap/openmetadata-ops.sh migrate &&\n \
      \ echo 'OpenMetadata database migration complete.'\n\"\n"
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
    - datalens-net
  openmetadata-server:
    image: openmetadata/server:1.6.1
    container_name: datalens-openmetadata-server
    restart: unless-stopped
    ports:
    - 8585:8585
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_USER_PASSWORD: ${POSTGRES_PASSWORD}
      OM_DATABASE: openmetadata
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: 'false'
      DB_AUTHENTICATION_TYPE: basic
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      SERVER_HOST_API_URL: http://openmetadata-server:8585
      AIRFLOW_HOST: http://airflow-webserver:8080
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://openmetadata-ingestion:8080
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8585/healthcheck || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      openmetadata-server-init:
        condition: service_completed_successfully
    networks:
    - datalens-net
  openmetadata-ingestion-init:
    image: openmetadata/ingestion:1.6.1
    container_name: datalens-openmetadata-ingestion-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/om_airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      OPENMETADATA_SERVER_URL: http://openmetadata-server:8585
    entrypoint: "/bin/bash -c \"\n  airflow db init &&\n  echo 'OpenMetadata ingestion\
      \ Airflow DB init complete.'\n\"\n"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - datalens-net
  openmetadata-ingestion:
    image: openmetadata/ingestion:1.6.1
    container_name: datalens-openmetadata-ingestion
    restart: unless-stopped
    ports:
    - 8083:8080
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/om_airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      OPENMETADATA_SERVER_URL: http://openmetadata-server:8585
    entrypoint: "/bin/bash -c \"\n  airflow users create --username admin --firstname\
      \ admin --lastname admin --password admin --email admin@openmetadata.org --role\
      \ Admin || true &&\n  airflow webserver &\n  exec airflow scheduler\n\"\n"
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      openmetadata-server:
        condition: service_started
      openmetadata-ingestion-init:
        condition: service_completed_successfully
    networks:
    - datalens-net
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: datalens-api
    restart: unless-stopped
    ports:
    - 8000:8000
    volumes:
    - ./api:/app
    - ./ingestion:/app/ingestion:ro
    env_file:
    - .env
    environment:
      POSTGRES_HOST: postgres
      TRINO_HOST: ${TRINO_HOST:-trino}
      TRINO_PORT: ${TRINO_PORT:-8080}
      TRINO_USER: ${TRINO_USER:-admin}
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    networks:
    - datalens-net
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datalens-frontend
    restart: unless-stopped
    ports:
    - 3000:3000
    volumes:
    - ./frontend:/app
    - /app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    networks:
    - datalens-net
