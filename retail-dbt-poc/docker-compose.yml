services:
  postgres:
    image: postgres:17
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123
      POSTGRES_DB: retail
    volumes:
      - ./db/create_databases.sh:/docker-entrypoint-initdb.d/create_databases.sh
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retail-poc-net

  elasticsearch:
    image: elasticsearch:8.11.0
    ports:
      - "9202:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - retail-poc-net

  # Runs DB schema migrations (Flyway) before the server starts.
  # OM 1.5.x requires migrations to be applied via openmetadata-ops.sh before
  # the main server can access its tables (openmetadata_settings, DATABASE_CHANGE_LOG, etc.)
  openmetadata-migrate:
    image: openmetadata/server:1.5.14
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: ["./bootstrap/openmetadata-ops.sh", "migrate"]
    environment:
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: "false"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: retail
      DB_USER_PASSWORD: retail123
      OM_DATABASE: openmetadata
      DB_PARAMS: sslmode=disable
      SERVER_PORT: "8585"
      SERVER_ADMIN_PORT: "8586"
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
    networks:
      - retail-poc-net
    restart: "no"   # one-shot — exits after migrations complete

  openmetadata-server:
    image: openmetadata/server:1.5.14
    ports:
      - "8588:8585"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    environment:
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: "false"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: retail
      DB_USER_PASSWORD: retail123
      OM_DATABASE: openmetadata
      AIRFLOW_HOST: http://localhost:8080
      SERVER_PORT: "8585"
      SERVER_ADMIN_PORT: "8586"
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_TRUST_ALL_CERTS: "true"
      OPENMETADATA_CLUSTER_NAME: openmetadata
      AUTHENTICATION_PROVIDER: basic
      AUTHENTICATION_PUBLIC_KEYS: '[http://localhost:8585/api/v1/system/config/jwks]'
      AUTHENTICATION_AUTHORITY: http://localhost:8585
      AUTHENTICATION_CLIENT_ID: open-metadata
      AUTHENTICATION_CALLBACK_URL: ""
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      AUTHORIZER_ADMIN_PRINCIPALS: '[admin]'
      AUTHORIZER_INGESTION_PRINCIPALS: '[ingestion-bot]'
      AUTHORIZER_PRINCIPAL_DOMAIN: open-metadata.org
      DB_PARAMS: sslmode=disable
      PIPELINE_SERVICE_CLIENT_ENABLED: "false"
      JWT_ISSUER: open-metadata.org
      JWT_KEY_ID: Gb389a-9f76-gdjs-a92j-0242bk94356
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8585/api/v1/system/status"]
      interval: 30s
      timeout: 15s
      retries: 10
    networks:
      - retail-poc-net

  openmetadata-ingestion:
    image: openmetadata/ingestion:1.5.14
    depends_on:
      - openmetadata-server
    environment:
      OPENMETADATA_SERVER_URL: http://openmetadata-server:8585
    command: ["sleep", "infinity"]
    networks:
      - retail-poc-net

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  retail-poc-net:
    driver: bridge
