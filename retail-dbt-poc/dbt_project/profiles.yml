retail_poc:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5435') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'retail') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'retail123') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'retail') }}"
      schema: staging
      threads: 4
