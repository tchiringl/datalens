# =============================================================================
# Trino Coordinator Configuration
# =============================================================================
# This node acts as both coordinator and worker (suitable for single-node POC).
# For a production multi-node cluster:
#   - Set node-scheduler.include-coordinator=false on the coordinator
#   - Create separate worker nodes with coordinator=false
# =============================================================================

coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080

# Memory limits — tune based on available host RAM
# Note: query.max-total-memory-per-node was removed in Trino 426+
query.max-memory=4GB
query.max-memory-per-node=1GB

# Task concurrency
task.concurrency=4
task.http-response-threads=100
task.max-worker-threads=16
