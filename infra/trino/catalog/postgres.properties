# =============================================================================
# Trino Catalog: postgres
# =============================================================================
# Connects Trino to the retail PostgreSQL database for federated SQL queries
# across the operational store and the Iceberg data lake.
#
# Usage from Trino CLI:
#   SHOW SCHEMAS FROM postgres;
#   SELECT * FROM postgres.public.orders LIMIT 10;
# =============================================================================

connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/retail
connection-user=datahub
connection-password=datahub123

# Push down aggregates and predicates to PostgreSQL where possible
postgresql.experimental.enable-string-pushdown-with-collate=false
join-pushdown.enabled=true
join-pushdown.strategy=AUTOMATIC
