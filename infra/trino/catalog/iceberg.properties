# =============================================================================
# Trino Catalog: iceberg
# =============================================================================
# Iceberg open table format backed by Apache Hive 4.0.1 standalone metastore
# and MinIO (S3-compatible). Uses Trino's native S3 filesystem.
# =============================================================================

connector.name=iceberg
iceberg.catalog.type=hive_metastore

hive.metastore.uri=thrift://hive-metastore:9083

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}

iceberg.file-format=PARQUET
iceberg.max-partitions-per-writer=100
