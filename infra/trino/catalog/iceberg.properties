# =============================================================================
# Trino Catalog: iceberg
# =============================================================================
# Iceberg open table format backed by Hive Metastore for catalog services and
# MinIO (S3-compatible) for data file storage.
#
# Usage from Trino CLI:
#   SHOW SCHEMAS FROM iceberg;
#   CREATE SCHEMA iceberg.retail WITH (location = 's3://warehouse/retail/');
#   CREATE TABLE iceberg.retail.sales (...)
#     WITH (format = 'PARQUET', location = 's3://warehouse/retail/sales/');
# =============================================================================

connector.name=iceberg
iceberg.catalog.type=hive_metastore

# Hive Metastore connection
hive.metastore.uri=thrift://hive-metastore:9083

# MinIO S3 endpoint (path-style access required for non-AWS S3)
hive.s3.endpoint=http://minio:9000
hive.s3.aws-access-key=minioadmin
hive.s3.aws-secret-key=minioadmin123
hive.s3.path-style-access=true
hive.s3.ssl.enabled=false

# Default file format for new tables
iceberg.file-format=PARQUET

# Performance tuning
iceberg.max-partitions-per-writer=100
hive.s3.socket-timeout=30s
hive.s3.connect-timeout=5s
hive.s3.max-error-retries=10
