# =============================================================================
# Trino Catalog: iceberg
# =============================================================================
# Iceberg open table format backed by Project Nessie (REST catalog)
# and MinIO (S3-compatible). Uses Trino's native S3 filesystem.
# =============================================================================

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://nessie:19120/iceberg

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}

iceberg.file-format=PARQUET
iceberg.max-partitions-per-writer=100
